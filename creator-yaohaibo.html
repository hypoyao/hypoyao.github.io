<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海波 - 创作者</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./home.css" />
    <link rel="stylesheet" href="./creators.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card homeCard">
        <header class="header">
          <h1>创作者</h1>
          <p class="desc">用 AI，释放孩子的奇思妙想，体验创造的快乐。</p>
          <p class="homeSub">点击作品卡片进入小游戏。</p>
        </header>

        <section class="creatorList" aria-label="creator">
          <section class="creatorCard" aria-label="creator-yaohaibo">
            <div class="creatorHead">
              <img class="creatorAvatar" src="/assets/avatars/yaohaibo.svg" alt="海波头像" />
              <div class="creatorInfo">
                <div class="creatorName">海波</div>
                <div class="creatorTag">作品集</div>
              </div>
            </div>

            <div class="creatorWorks">
              <a class="gameItem gameItemCompact" href="./ttt.html" aria-label="井字棋对决">
                <img class="gameThumb" src="/assets/screenshots/ttt.png" alt="井字棋对决截图" />
                <div>
                  <div class="gameName">井字棋对决</div>
                  <div class="gameDesc">3 子上限版井字棋，对战 AI</div>
                </div>
              </a>

              <a class="gameItem gameItemCompact" href="./memory.html" aria-label="记忆闪击">
                <img class="gameThumb" src="/assets/screenshots/memory.png" alt="记忆闪击截图" />
                <div>
                  <div class="gameName">记忆闪击</div>
                  <div class="gameDesc">看亮起顺序依次点击，连胜晋级</div>
                </div>
              </a>
            </div>
          </section>
        </section>

        <div class="homeFooter">
          <a class="btn btnSecondary" href="./index.html">返回首页</a>
        </div>
      </section>
    </main>
  </body>
</html>
