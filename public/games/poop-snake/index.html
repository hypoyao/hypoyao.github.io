<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇屎大作战</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>贪吃蛇屎大作战</h1>
          <p class="desc" id="ruleText">
            吃到像素棕色大便会长身体。长到 15 节后，AI 贪吃蛇会陆续出现（最多 5 只）。
            你可以发射炮弹（会少一节身体）或使用甩尾剑（尾巴甩 3 下赶走敌人）。
          </p>
        </header>

        <section class="status" id="status">准备就绪：按下面按钮移动</section>

        <section class="card poopHud" aria-label="hud">
          <div class="poopHudRow">
            <div class="poopStat">
              <div class="poopStatLabel">我的长度</div>
              <div class="poopStatVal" id="lenText">1</div>
            </div>
            <div class="poopStat">
              <div class="poopStatLabel">AI 蛇数量</div>
              <div class="poopStatVal" id="aiText">0</div>
            </div>
            <div class="poopStat">
              <div class="poopStatLabel">炮弹消耗</div>
              <div class="poopStatVal">-1 节</div>
            </div>
          </div>
        </section>

        <div class="poopStage">
          <canvas id="cv" width="540" height="396" aria-label="snake canvas"></canvas>
        </div>

        <section class="poopControls" aria-label="controls">
          <div class="pad">
            <button class="btn btnGray padBtn" id="upBtn" type="button" aria-label="上">↑</button>
            <div class="padRow">
              <button class="btn btnGray padBtn" id="leftBtn" type="button" aria-label="左">←</button>
              <button class="btn btnGray padBtn" id="downBtn" type="button" aria-label="下">↓</button>
              <button class="btn btnGray padBtn" id="rightBtn" type="button" aria-label="右">→</button>
            </div>
          </div>

          <div class="skillBox">
            <button class="btn" id="startBtn" type="button">开始</button>
            <button class="btn" id="fireBtn" type="button">发射炮弹</button>
            <button class="btn btnGray" id="tailBtn" type="button">甩尾剑</button>
            <button class="btn btnGray" id="restartBtn" type="button">重新开始</button>
          </div>
        </section>

        <div class="gameFooter">
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </section>
    </main>

    <div class="modal" id="endModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="game over dialog">
        <div class="modalTitle" id="endTitle">游戏结束</div>
        <div class="modalBody" id="endBody" style="font-size: 18px">--</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="endBtn" type="button">再来一局</button>
        </div>
      </div>
    </div>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
