<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃小猫打地鼠</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Nunito&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/lucide@latest/icons.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐱 贪吃小猫打地鼠</h1>
            <p class="subtitle">小猫又来偷吃小鱼干了！快用锤子轻轻敲它们脑袋~</p>
        </header>
        
        <div class="game-info">
            <div class="score-board">
                <div class="score-item">
                    <i class="lucide lucide-trophy"></i>
                    <span>分数：<strong id="score">0</strong></span>
                </div>
                <div class="score-item">
                    <i class="lucide lucide-clock"></i>
                    <span>时间：<strong id="time">60</strong>秒</span>
                </div>
                <div class="score-item">
                    <i class="lucide lucide-target"></i>
                    <span>难度：<strong id="difficulty">简单</strong></span>
                </div>
            </div>
            
            <div class="controls">
                <div class="difficulty-buttons">
                    <button id="easy" class="difficulty-btn active">简单</button>
                    <button id="medium" class="difficulty-btn">中等</button>
                    <button id="hard" class="difficulty-btn">困难</button>
                </div>
                
                <div class="action-buttons">
                    <button id="start" class="btn start-btn">
                        <i class="lucide lucide-play"></i> 开始游戏
                    </button>
                    <button id="reset" class="btn reset-btn">
                        <i class="lucide lucide-refresh-cw"></i> 重新开始
                    </button>
                    <button id="sound" class="btn sound-btn">
                        <i class="lucide lucide-volume-2"></i> 声音：开
                    </button>
                </div>
            </div>
        </div>
        
        <div class="game-container">
            <!-- 锤子光标 -->
            <div id="hammer" class="hammer">🔨</div>
            
            <!-- 游戏区域 -->
            <div class="game-board">
                <div class="holes">
                    <!-- 9个洞，每个洞里有一只小猫 -->
                    <div class="hole" data-id="0">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                    <div class="hole" data-id="1">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                    <div class="hole" data-id="2">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                    <div class="hole" data-id="3">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                    <div class="hole" data-id="4">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                    <div class="hole" data-id="5">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                    <div class="hole" data-id="6">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                    <div class="hole" data-id="7">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                    <div class="hole" data-id="8">
                        <div class="cat">🐱</div>
                        <div class="hole-top"></div>
                    </div>
                </div>
                
                <div class="grass"></div>
                <div class="instructions">
                    <p>🎯 点击探出头的小猫！每只+10分，漏掉-5分</p>
                    <p>⚡ 难度越高，小猫出现时间越短！</p>
                </div>
            </div>
        </div>
        
        <div class="message" id="message">点击“开始游戏”按钮！</div>
    </div>
    
    <!-- 音频元素 -->
    <audio id="hitSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-retro-game-emergency-alarm-1000.mp3" type="audio/mpeg">
    </audio>
    <audio id="missSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-game-ball-tap-2073.mp3" type="audio/mpeg">
    </audio>
    <audio id="bgMusic" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-game-show-suspense-waiting-667.mp3" type="audio/mpeg">
    </audio>
    
    <script src="./game.js"></script>
</body>
</html>
