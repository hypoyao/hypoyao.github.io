<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧨 扫雷小游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>💣 扫雷</h1>
    
    <div class="controls">
      <div class="difficulty">
        <button onclick="setDifficulty('easy')" class="active" id="btn-easy">初级</button>
        <button onclick="setDifficulty('medium')" id="btn-medium">中级</button>
        <button onclick="setDifficulty('hard')" id="btn-hard">高级</button>
      </div>
      <div class="game-info">
        <span>🚩 <span id="flag-count">0</span></span>
        <button class="face-btn" onclick="initGame()" id="face-btn">😊</button>
        <span>⏱️ <span id="timer">0</span></span>
      </div>
      <div class="mode-switch">
        <button onclick="toggleFlagMode()" id="flag-btn" class="flag-mode">🚩 插旗</button>
      </div>
    </div>
    
    <div class="board-wrapper">
      <div id="board" class="board"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
