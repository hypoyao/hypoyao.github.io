<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>国际象棋·新手友好版</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./chess.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>国际象棋·新手友好版</h1>
          <a class="creatorBadge" aria-label="创作者" href="/creators/tianqing">
            <img class="creatorBadgeAvatar" src="/assets/avatars/yaotianjing.svg" alt="天晴头像" />
            <span class="creatorBadgeName">创作者：天晴</span>
          </a>
          <p class="desc" id="ruleText">规则：标准国际象棋。您执白对战 AI 执黑。支持 AI 提示；点您的棋子会提示走法并高亮可走范围。</p>
        </header>

        <section class="chHud" aria-label="chess hud">
          <div class="chLeft">
            <div class="chTopRow">
              <div class="chStatus" id="status">轮到 您</div>
              <div class="chProb" id="winProb" aria-label="win probability">
                <span class="chProbLabel">本局胜率</span><span class="chProbSep">：</span>
                <span class="chProbVal" id="winProbVal">--%</span>
              </div>
            </div>
            <div class="chHintText" id="hintText">点击您的棋子查看走法</div>
          </div>
          <div class="chRight">
            <div class="chDiffLabel">当前等级</div>
            <div class="chDiffGrid" id="diffGrid" role="button" tabindex="0" aria-label="当前等级"></div>
            <span class="srOnly" id="diffText">当前等级 --</span>
          </div>
        </section>

        <div class="chBoard" id="board" aria-label="chess board"></div>

        <div class="gameActions">
          <button class="btn" id="hintBtn" type="button">提示一步</button>
          <button class="btn" id="undoBtn" type="button">悔棋</button>
          <button class="btn" id="resetBtn" type="button">重新开始</button>
          
        </div>

        <div class="gameFooter">
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </section>
    </main>

    <!-- 结果弹窗 -->
    <div class="modal" id="chModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="chess result dialog">
        <div class="modalTitle" id="chModalTitle">本局结果</div>
        <div class="modalBody" id="chModalBody" style="font-size: 18px">--</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="chModalBtn" type="button">再来一局</button>
        </div>
      </div>
    </div>

    <!-- 难度提示 -->
    <div class="modal" id="chTipModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel tipPanel" role="dialog" aria-modal="true" aria-label="chess tip dialog">
        <div class="tipText" id="chTipText">难度等级 1-10，输赢后会自动升降等级</div>
      </div>
    </div>

    <!-- 升变选择 -->
    <div class="modal" id="promoModal" aria-hidden="true">
      <div class="modalBackdrop"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="promotion dialog">
        <div class="modalTitle">兵升变</div>
        <div class="modalBody" style="font-size: 16px">
          请选择要升变成的棋子：
          <div class="promoRow" id="promoRow"></div>
        </div>
      </div>
    </div>

    <!-- 重新开始：一次确认 -->
    <div class="modal" id="resetModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="reset confirm dialog">
        <div class="modalTitle">重新开始</div>
        <div class="modalBody" id="resetModalBody" style="font-size: 16px">确定要重新开始吗？</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="resetCancelBtn" type="button">取消</button>
          <button class="btn btnDanger modalBtn" id="resetConfirmBtn" type="button">确定</button>
        </div>
      </div>
    </div>

    <!-- 难度调节彩蛋：连续点击“轮到 您”3次触发 -->
    <div class="modal" id="diffModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="difficulty dialog">
        <div class="modalTitle">难度调节</div>
        <div class="modalBody" style="font-size: 16px">
          <div>手动选择当前等级（1-10）：</div>
          <div class="diffPicker" id="diffModalPicker" aria-label="difficulty picker"></div>
          <div style="margin-top: 10px; font-size: 13px; color: rgba(100, 116, 139, 0.95)">
            当前等级：<strong id="diffModalCurrent">--</strong>
          </div>
        </div>
        <div class="modalActions">
          <button class="btn modalBtn" id="diffModalCloseBtn" type="button">关闭</button>
        </div>
      </div>
    </div>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./chess.js"></script>
    <script>
      ;(function () {
        try {
          const p = location.pathname || ""
          const gi = p.indexOf("/games/")
          if (gi < 0) return
          const base = p.slice(0, gi)
          const m = p.slice(gi).match(/^\/games\/([^/]+)\//)
          const gid = m && m[1]
          if (!gid) return
          fetch(`${base}/api/games/${encodeURIComponent(gid)}`, { cache: "no-store" })
            .then((r) => r.json())
            .then((j) => {
              const g = j && j.ok && j.game ? j.game : null
              if (!g) return
              if (g.ruleText) {
                const el = document.getElementById("ruleText")
                if (el) el.textContent = g.ruleText
              }
              if (g.title) {
                document.title = g.title
                const h1 = document.querySelector("h1")
                if (h1) h1.textContent = g.title
              }
            })
            .catch(() => {})
        } catch {}
      })()
    </script>
  </body>
</html>
