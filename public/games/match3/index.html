<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数字消消乐</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card m3Card">
        <header class="header">
          <div class="m3TopRow">
            <h1>数字消消乐</h1>
          </div>
          <p class="desc" id="ruleText">
            交换相邻的数字，凑到 3 个一样的会触发一道题～答对了才会消掉！挑战：3 分钟内消掉方块 15 次（包括 15 次和 15 次以上）。
          </p>
        </header>

        <section class="m3Hud" aria-label="hud">
          <div class="m3Stat">
            <div class="m3Label">分数</div>
            <div class="m3Value" id="scoreText">0</div>
          </div>
          <div class="m3Stat">
            <div class="m3Label">连击</div>
            <div class="m3Value" id="comboText">x1</div>
          </div>
          <div class="m3Stat">
            <div class="m3Label">提示</div>
            <div class="m3Value" id="hintText">点方块再点旁边</div>
          </div>
          <div class="m3Stat">
            <div class="m3Label">时间</div>
            <div class="m3Value" id="timeText">03:00</div>
          </div>
          <div class="m3Stat">
            <div class="m3Label">消除次数</div>
            <div class="m3Value" id="clearText">0</div>
          </div>
        </section>

        <div class="m3Stage">
          <div id="board" class="m3Board" aria-label="match3 board"></div>
        </div>

        <section class="m3Controls" aria-label="controls">
          <button class="btn btnGray" id="hintBtn" type="button">提示一步</button>
          <button class="btn btnGray" id="shuffleBtn" type="button">重新洗牌</button>
          <button class="btn" id="restartBtn" type="button">重新开始</button>
        </section>

        <div class="m3Foot">
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </section>
    </main>

    <div class="modal" id="toast" aria-hidden="true">
      <div class="toastPanel" id="toastText">--</div>
    </div>

    <!-- 算术题弹窗：答对才消除 -->
    <div class="m3Quiz" id="quizModal" aria-hidden="true">
      <div class="m3QuizBackdrop" aria-hidden="true"></div>
      <div class="m3QuizPanel" role="dialog" aria-modal="true" aria-label="算术题">
        <div class="m3QuizTitle">小挑战：面积是多少？</div>
        <div class="m3QuizExpr" id="quizExpr">--</div>

        <div class="m3QuizInputRow" id="quizInputRow">
          <input id="quizInput" class="restInput" inputmode="numeric" placeholder="输入答案" />
          <button class="btn" id="quizSubmit" type="button">确定</button>
        </div>

        <!-- 手机：给出可点选的数字 -->
        <div class="m3Picker" id="quizPicker" aria-label="选择答案"></div>

        <div class="m3QuizHint">提示：电脑直接键盘输入；手机点下面的数字。</div>
      </div>
    </div>

    <!-- 结算：3 分钟结束 -->
    <div class="m3End" id="endModal" aria-hidden="true">
      <div class="m3EndBackdrop" aria-hidden="true"></div>
      <div class="m3EndPanel" role="dialog" aria-modal="true" aria-label="结算">
        <div class="m3EndText" id="endText">--</div>
        <div class="m3EndSub" id="endSub">--</div>
        <div class="m3EndActions">
          <button class="btn" id="endRestartBtn" type="button">再来一局</button>
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </div>
    </div>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
