<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>反弹球历险</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./bounce.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>反弹球历险</h1>
          <a class="creatorBadge" aria-label="创作者" href="/creators/tianqing">
            <img class="creatorBadgeAvatar" src="/assets/avatars/yaotianjing.svg" alt="天晴头像" />
            <span class="creatorBadgeName">创作者：天晴</span>
          </a>
          <p class="desc" id="ruleText">规则：左右移动挡板，让小球反弹击碎方块。清空方块获胜；小球落到底部则失败。支持键盘 ←/→。</p>
        </header>

        <section class="bbHud" aria-label="hud">
          <div class="bbStatus" id="status">点击开始 / 点击任意方向键开始</div>
          <div class="bbMeta">
            <span id="levelTap">关卡：<strong id="levelText">1</strong></span>
            <span class="bbSep">·</span>
            <span>得分：<strong id="scoreText">0</strong></span>
            <span class="bbSep">·</span>
            <span id="lifeTap">生命：<strong id="lifeText">3</strong></span>
          </div>
        </section>

        <div class="bbStage" id="stage" aria-label="game stage" tabindex="0">
          <canvas class="bbCanvas" id="canvas" width="540" height="720"></canvas>
        </div>

        <div class="bbControls" aria-label="controls">
          <button class="bbBtn" id="leftBtn" type="button" aria-label="向左">◀</button>
          <button class="bbBtn bbBtnMid" id="restartBtn" type="button" aria-label="重新开始">重新开始</button>
          <button class="bbBtn" id="rightBtn" type="button" aria-label="向右">▶</button>
        </div>
        <div class="bbControls2" aria-label="multi-ball controls">
          <button class="bbBtn bbBtnMid" id="fireBtn" type="button" aria-label="继续发射">继续发射</button>
        </div>

        <div class="gameFooter">
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </section>
    </main>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./bounce.js"></script>
  </body>
</html>
