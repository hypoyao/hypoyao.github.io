<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小俄罗斯方块 - 魔法积木游戏</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/lucide@latest/icons/play.svg" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #6ee7b7, #3b82f6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1f2937;
        }
        .game-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 25px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #ef4444;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #fbbf24;
        }
        .subtitle {
            color: #7c3aed;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .game-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .left-panel, .right-panel {
            flex: 1;
            min-width: 250px;
        }
        canvas {
            border: 4px solid #10b981;
            background-color: #0f172a;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
        }
        .info-box {
            background-color: #fef3c7;
            border: 3px dashed #f59e0b;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-box h2 {
            color: #dc2626;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .score, .next-piece {
            font-size: 1.5rem;
            color: #1d4ed8;
            margin: 10px 0;
        }
        .controls {
            margin-top: 20px;
        }
        .controls p {
            font-size: 1.1rem;
            color: #374151;
            margin-bottom: 10px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }
        button {
            background-color: #8b5cf6;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 0 #6d28d9;
        }
        button:hover {
            background-color: #7c3aed;
            transform: translateY(-3px);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #6d28d9;
        }
        .game-over {
            font-size: 2rem;
            color: #ef4444;
            margin-top: 20px;
            display: none;
        }
        .footer {
            margin-top: 20px;
            color: #4b5563;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧩 小小俄罗斯方块</h1>
        <p class="subtitle">快来堆叠积木伙伴，创造消除魔法！</p>
        
        <div class="game-area">
            <div class="left-panel">
                <div class="info-box">
                    <h2>🎯 游戏主战场</h2>
                    <canvas id="gameCanvas" width="300" height="600"></canvas>
                    <p class="score">分数：<span id="score">0</span></p>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="info-box">
                    <h2>🔮 下一个积木伙伴</h2>
                    <canvas id="nextCanvas" width="150" height="150"></canvas>
                </div>
                
                <div class="info-box">
                    <h2>🎮 控制魔法</h2>
                    <div class="controls">
                        <p>使用键盘：</p>
                        <p>← → 移动 | ↑ 旋转 | ↓ 加速下落</p>
                        <div class="buttons">
                            <button id="leftBtn">← 左移</button>
                            <button id="rightBtn">→ 右移</button>
                            <button id="rotateBtn">↻ 旋转</button>
                            <button id="downBtn">↓ 快落</button>
                            <button id="pauseBtn">⏸️ 暂停</button>
                            <button id="restartBtn">🔄 重新开始</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="gameOver" class="game-over">游戏结束啦！你的分数是：<span id="finalScore">0</span></div>
        
        <div class="footer">
            <p>💡 提示：积木伙伴落到底部就会固定，试着快速思考哦！</p>
        </div>
    </div>

    <script>
        // 获取画布和按钮元素
        const gameCanvas = document.getElementById('gameCanvas');
        const nextCanvas = document.getElementById('nextCanvas');
        const ctx = gameCanvas.getContext('2d');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        
        // 游戏设置
        const COLS = 10; // 主战场有10列格子
        const ROWS = 20; // 主战场有20行格子
        const BLOCK_SIZE = 30; // 每个格子的大小（像素）
        
        // 积木伙伴的形状和颜色（7种不同形状，每种颜色鲜艳）
        const SHAPES = [
            { shape: [[1,1,1,1]], color: '#ef4444' }, // I 形，红色
            { shape: [[1,1],[1,1]], color: '#f59e0b' }, // O 形，橙色
            { shape: [[0,1,0],[1,1,1]], color: '#10b981' }, // T 形，绿色
            { shape: [[1,0,0],[1,1,1]], color: '#3b82f6' }, // J 形，蓝色
            { shape: [[0,0,1],[1,1,1]], color: '#8b5cf6' }, // L 形，紫色
            { shape: [[0,1,1],[1,1,0]], color: '#ec4899' }, // S 形，粉色
            { shape: [[1,1,0],[0,1,1]], color: '#06b6d4' }  // Z 形，青色
        ];
        
        // 游戏状态变量
        let board = []; // 主战场，记录哪些格子被占了
        let currentPiece = null; // 当前正在下落的积木伙伴
        let nextPiece = null; // 下一个积木伙伴
        let score = 0; // 分数
        let gameOver = false; // 游戏是否结束
        let dropInterval = 1000; // 积木伙伴下落的时间间隔（毫秒），初始1秒
        let dropStart = Date.now(); // 记录上次下落的时间
        let isPaused = false; // 游戏是否暂停
        
        // 初始化主战场：创建一个空网格，0表示空，1表示被占
        function createBoard() {
            board = [];
            for (let row = 0; row < ROWS; row++) {
                board.push(new Array(COLS).fill(0));
            }
        }
        
        // 创建一个随机的积木伙伴
        function createPiece() {
            const randomShape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            return {
                shape: randomShape.shape,
                color: randomShape.color,
                x: Math.floor(COLS / 2) - Math.floor(randomShape.shape[0].length / 2), // 从中间开始下落
                y: 0 // 从顶部开始
            };
        }
        
        // 绘制一个积木伙伴到画布上
        function drawPiece(piece, context, offsetX = 0, offsetY = 0) {
            context.fillStyle = piece.color;
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        // 绘制一个带圆角的格子，看起来更可爱
                        context.fillRect(
                            (piece.x + col) * BLOCK_SIZE + offsetX,
                            (piece.y + row) * BLOCK_SIZE + offsetY,
                            BLOCK_SIZE,
                            BLOCK_SIZE
                        );
                        context.strokeStyle = 'white';
                        context.strokeRect(
                            (piece.x + col) * BLOCK_SIZE + offsetX,
                            (piece.y + row) * BLOCK_SIZE + offsetY,
                            BLOCK_SIZE,
                            BLOCK_SIZE
                        );
                    }
                }
            }
        }
        
        // 绘制整个主战场
        function drawBoard() {
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            // 绘制背景网格线，帮助看清格子
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    ctx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                }
            }
            // 绘制已经固定的积木伙伴
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.strokeStyle = 'white';
                        ctx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }
            // 绘制当前正在下落的积木伙伴
            if (currentPiece) {
                drawPiece(currentPiece, ctx);
            }
        }
        
        // 绘制下一个积木伙伴预览
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                // 为了在预览中居中显示，计算偏移量
                const offsetX = (nextCanvas.width - nextPiece.shape[0].length * BLOCK_SIZE) / 2;
                const offsetY = (nextCanvas.height - nextPiece.shape.length * BLOCK_SIZE) / 2;
                drawPiece(nextPiece, nextCtx, offsetX, offsetY);
            }
        }
        
        // 检查积木伙伴是否碰到边界或其他积木
        function collision(piece, newX, newY) {
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        const x = newX + col;
                        const y = newY + row;
                        // 检查是否超出边界或与已固定的积木重叠
                        if (x < 0 || x >= COLS || y >= ROWS || (y >= 0 && board[y][x])) {
                            return true; // 发生碰撞
                        }
                    }
                }
            }
            return false; // 没有碰撞
        }
        
        // 将当前积木伙伴固定到主战场
        function mergePiece() {
            for (let row = 0; row < currentPiece.shape.length; row++) {
                for (let col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        const y = currentPiece.y + row;
                        const x = currentPiece.x + col;
                        if (y >= 0) { // 只记录在战场内的部分
                            board[y][x] = currentPiece.color;
                        }
                    }
                }
            }
        }
        
        // 检查并消除满行，然后加分
        function clearLines() {
            let linesCleared = 0;
            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row].every(cell => cell !== 0)) {
                    // 这一行全满了，像魔法一样消除它
                    board.splice(row, 1); // 删除这一行
                    board.unshift(new Array(COLS).fill(0)); // 在顶部添加新的空行
                    linesCleared++;
                    row++; // 因为删除了行，需要再次检查同一位置的新行
                }
            }
            if (linesCleared > 0) {
                // 根据消除的行数加分，消除越多，分数越高
                score += linesCleared * 100 * linesCleared;
                scoreElement.textContent = score;
                // 随着分数增加，下落速度加快，增加挑战
                dropInterval = Math.max(100, 1000 - Math.floor(score / 500) * 50);
            }
        }
        
        // 移动积木伙伴（左右移动或下落）
        function movePiece(dx, dy) {
            if (gameOver || isPaused) return;
            if (!collision(currentPiece, currentPiece.x + dx, currentPiece.y + dy)) {
                currentPiece.x += dx;
                currentPiece.y += dy;
                drawBoard();
                return true;
            }
            // 如果向下移动发生碰撞，说明积木伙伴落到底了
            if (dy > 0) {
                mergePiece(); // 固定到主战场
                clearLines(); // 检查消除行
                // 生成新的积木伙伴
                currentPiece = nextPiece;
                nextPiece = createPiece();
                drawNextPiece();
                // 检查游戏是否结束（新积木伙伴一出现就碰撞）
                if (collision(currentPiece, currentPiece.x, currentPiece.y)) {
                    gameOver = true;
                    gameOverElement.style.display = 'block';
                    finalScoreElement.textContent = score;
                }
            }
            return false;
        }
        
        // 旋转积木伙伴
        function rotatePiece() {
            if (gameOver || isPaused) return;
            // 将积木伙伴的形状矩阵旋转90度
            const rotated = [];
            for (let col = 0; col < currentPiece.shape[0].length; col++) {
                const newRow = [];
                for (let row = currentPiece.shape.length - 1; row >= 0; row--) {
                    newRow.push(currentPiece.shape[row][col]);
                }
                rotated.push(newRow);
            }
            const originalShape = currentPiece.shape;
            currentPiece.shape = rotated;
            // 检查旋转后是否碰撞，如果碰撞就恢复原状
            if (collision(currentPiece, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = originalShape;
            }
            drawBoard();
        }
        
        // 游戏主循环
        function gameLoop() {
            if (gameOver || isPaused) return;
            const now = Date.now();
            const delta = now - dropStart;
            if (delta > dropInterval) {
                movePiece(0, 1); // 让积木伙伴自动下落一格
                dropStart = now;
            }
            drawBoard();
            requestAnimationFrame(gameLoop); // 重复调用，形成动画
        }
        
        // 初始化游戏
        function initGame() {
            createBoard();
            currentPiece = createPiece();
            nextPiece = createPiece();
            score = 0;
            gameOver = false;
            dropInterval = 1000;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            drawBoard();
            drawNextPiece();
            gameLoop();
        }
        
        // 设置键盘控制
        document.addEventListener('keydown', (event) => {
            if (gameOver || isPaused) return;
            switch (event.key) {
                case 'ArrowLeft':
                    movePiece(-1, 0); // 左移
                    break;
                case 'ArrowRight':
                    movePiece(1, 0); // 右移
                    break;
                case 'ArrowDown':
                    movePiece(0, 1); // 加速下落
                    break;
                case 'ArrowUp':
                    rotatePiece(); // 旋转
                    break;
                case ' ':
                    // 空格键快速下落到底
                    while (movePiece(0, 1)) {}
                    break;
            }
        });
        
        // 设置按钮控制
        document.getElementById('leftBtn').addEventListener('click', () => movePiece(-1, 0));
        document.getElementById('rightBtn').addEventListener('click', () => movePiece(1, 0));
        document.getElementById('rotateBtn').addEventListener('click', rotatePiece);
        document.getElementById('downBtn').addEventListener('click', () => movePiece(0, 1));
        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶️ 继续' : '⏸️ 暂停';
            if (!isPaused) {
                dropStart = Date.now(); // 重置下落计时
                gameLoop();
            }
        });
        document.getElementById('restartBtn').addEventListener('click', initGame);
        
        // 启动游戏
        initGame();
    </script>
</body>
</html>
