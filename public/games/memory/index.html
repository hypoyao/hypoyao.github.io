<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记忆闪击</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./memory.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>记忆闪击</h1>
          <a class="creatorBadge" aria-label="创作者" href="/creators/p_c97da2e28d">
            <img class="creatorBadgeAvatar" src="/assets/avatars/yaohaibo.svg" alt="海波头像" />
            <span class="creatorBadgeName">创作者：海波</span>
          </a>
          <p class="desc" id="ruleText">
            规则：系统会按顺序亮起几个方块；你需要<strong>按亮起顺序依次点击</strong>。
          </p>
        </header>

        <section class="memHud" aria-label="difficulty and progress">
          <div class="memHudLeft">
            <div class="memHudLabel">难度等级</div>
            <div class="memLevelGrid" id="levelGrid" role="img" aria-label="level progress"></div>
          </div>
          <div class="memHudRight">
            <div class="memStatusLine" id="levelText">第 1 级</div>
            <div class="memStatusSub" id="trialText">本级进度：0 / 3</div>
          </div>
        </section>

        <div class="memStatus" id="status">点击“开始”进入挑战</div>

        <div class="memBoard" id="board" aria-label="memory board"></div>

        <div class="gameActions memActions">
          <button class="btn" id="startBtn" type="button">开始</button>
          
        </div>

        <div class="gameFooter">
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </section>
    </main>

    <!-- 结果提示弹窗 -->
    <div class="modal" id="memModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel memModalPanel" role="dialog" aria-modal="true" aria-label="memory result dialog">
        <div class="memModalBody" id="memModalBody">--</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="memModalBtn" type="button">继续</button>
        </div>
      </div>
    </div>

    <!-- 难度提示：点击“难度等级”弹出 -->
    <div class="modal" id="memTipModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel tipPanel" role="dialog" aria-modal="true" aria-label="memory tip dialog">
        <div class="tipText" id="memTipText">难度等级 1-10，输赢后会自动升降等级</div>
      </div>
    </div>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./memory.js"></script>
    <script src="/game-creator.js"></script>
    <script>
      ;(function () {
        try {
          const p = location.pathname || ""
          const gi = p.indexOf("/games/")
          if (gi < 0) return
          const base = p.slice(0, gi)
          const m = p.slice(gi).match(/^\/games\/([^/]+)\//)
          const gid = m && m[1]
          if (!gid) return
          fetch(`${base}/api/games/${encodeURIComponent(gid)}`, { cache: "no-store" })
            .then((r) => r.json())
            .then((j) => {
              const g = j && j.ok && j.game ? j.game : null
              if (!g) return
              if (g.ruleText) {
                const el = document.getElementById("ruleText")
                if (el) el.textContent = g.ruleText
              }
              if (g.title) {
                document.title = g.title
                const h1 = document.querySelector("h1")
                if (h1) h1.textContent = g.title
              }
            })
            .catch(() => {})
        } catch {}
      })()
    </script>
  </body>
</html>
