<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>围棋·新手友好版</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./weiqi.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>围棋·新手友好版</h1>
          <a class="creatorBadge" aria-label="创作者" href="/creators/tianqing">
            <img class="creatorBadgeAvatar" src="/assets/avatars/yaotianjing.svg" alt="天晴头像" />
            <span class="creatorBadgeName">创作者：天晴</span>
          </a>
          <p class="desc">规则：您（黑）先手对战 AI（白）。支持 AI 提示；双方连续 Pass 后数目判胜负；胜利难度 +1，失败难度 -1。</p>
        </header>

        <section class="gHud" aria-label="go hud">
          <div class="gLeft">
            <div class="gTopRow">
              <div class="gStatus" id="status">轮到 您（黑）</div>
              <div class="gProb" id="winProb" aria-label="win probability">
                <span class="gProbLabel">本局胜率</span><span class="gProbSep">：</span>
                <span class="gProbVal" id="winProbVal">--%</span>
              </div>
            </div>
            <div class="gHint" id="hintText">点击交叉点落子（围棋 9×9）</div>
          </div>
          <div class="gRight">
            <div class="gDiffLabel">当前等级</div>
            <div class="gDiffGrid" id="diffGrid" aria-label="当前等级"></div>
            <span class="srOnly" id="diffText">当前等级 --</span>
          </div>
        </section>

        <div class="gBoard" id="board" aria-label="go board"></div>

        <div class="gameActions">
          <button class="btn" id="hintBtn" type="button">提示一步</button>
          <button class="btn" id="undoBtn" type="button">悔棋</button>
          <button class="btn" id="passBtn" type="button">Pass</button>
          <button class="btn" id="resignBtn" type="button">认输</button>
          <button class="btn" id="resetBtn" type="button">重新开始</button>
          
        </div>

        <div class="gameFooter">
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </section>
    </main>

    <!-- 结果弹窗 -->
    <div class="modal" id="gModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="go result dialog">
        <div class="modalTitle" id="gModalTitle">本局结果</div>
        <div class="modalBody" id="gModalBody" style="font-size: 18px">--</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="gModalBtn" type="button">再来一局</button>
        </div>
      </div>
    </div>

    <!-- 重新开始：一次确认 -->
    <div class="modal" id="resetModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="reset confirm dialog">
        <div class="modalTitle">重新开始</div>
        <div class="modalBody" id="resetModalBody" style="font-size: 16px">确定要重新开始吗？</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="resetCancelBtn" type="button">取消</button>
          <button class="btn btnDanger modalBtn" id="resetConfirmBtn" type="button">确定</button>
        </div>
      </div>
    </div>

    <!-- 难度调节彩蛋：连续点击“轮到 您”3次触发 -->
    <div class="modal" id="diffModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="difficulty dialog">
        <div class="modalTitle">难度调节</div>
        <div class="modalBody" style="font-size: 16px">
          <div>手动选择当前等级（1-10）：</div>
          <div class="diffPicker" id="diffModalPicker" aria-label="difficulty picker"></div>
          <div style="margin-top: 10px; font-size: 13px; color: rgba(100, 116, 139, 0.95)">
            当前等级：<strong id="diffModalCurrent">--</strong>
          </div>
        </div>
        <div class="modalActions">
          <button class="btn modalBtn" id="diffModalCloseBtn" type="button">关闭</button>
        </div>
      </div>
    </div>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./weiqi.js"></script>
  </body>
</html>
