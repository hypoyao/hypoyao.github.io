<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>华容道</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./huarongdao.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>华容道</h1>
          <a class="creatorBadge" aria-label="创作者" href="/creators/tianqing">
            <img class="creatorBadgeAvatar" src="/assets/avatars/yaotianjing.svg" alt="天晴头像" />
            <span class="creatorBadgeName">创作者：天晴</span>
          </a>
          <p class="desc" id="ruleText">
            规则：拖动棋子（一次移动一格），帮助「曹操」走到最下方出口位置。支持悔棋与计步计时。
          </p>
        </header>

        <section class="hrdHud" aria-label="hud">
          <div class="hrdLeft">
            <div class="hrdTopRow">
              <div class="hrdStatus" id="status">点击开始后拖动棋子</div>
              <div class="hrdProb" id="winProb" aria-label="win probability">
                <span class="hrdProbLabel">本局胜率</span><span class="hrdProbSep">：</span>
                <span class="hrdProbVal" id="winProbVal">--%</span>
              </div>
            </div>
            <div class="hrdMeta">
              <span>步数：<strong id="movesText">0</strong></span>
              <span class="hrdSep">·</span>
              <span>用时：<strong id="timeText">00:00</strong></span>
            </div>
          </div>
        </section>

        <div class="hrdBoardWrap">
          <div class="hrdBoard" id="board" aria-label="huarongdao board"></div>
          <div class="hrdExit" aria-hidden="true">
            <span>出口</span>
          </div>
        </div>

        <div class="hrdControls" aria-label="controls">
          <button class="btn btnGray" id="hintBtn" type="button">提示解法</button>
          <button class="btn" id="startBtn" type="button">开始</button>
          <button class="btn btnGray" id="restartBtn" type="button">重新开始</button>
        </div>

        <div class="gameFooter">
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </section>
    </main>

    <!-- 结果弹窗 -->
    <div class="modal" id="hrdModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="huarongdao result dialog">
        <div class="modalTitle" id="hrdModalTitle">通关</div>
        <div class="modalBody" id="hrdModalBody" style="font-size: 18px">--</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="hrdModalBtn" type="button">再来一局</button>
        </div>
      </div>
    </div>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./huarongdao.js"></script>
  </body>
</html>
