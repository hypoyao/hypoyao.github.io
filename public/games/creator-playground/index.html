<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大冒险 | 小小架构师</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-snake"></i> 贪吃蛇大冒险</h1>
        <p class="subtitle">控制小蛇吃光所有的苹果！</p>

        <div class="game-header">
            <div class="score-box">
                <span class="score-label"><i class="fas fa-apple-alt"></i> 分数：</span>
                <span id="score">0</span>
            </div>
            <div class="controls">
                <button id="startBtn" class="btn"><i class="fas fa-play"></i> 开始游戏</button>
                <button id="pauseBtn" class="btn"><i class="fas fa-pause"></i> 暂停</button>
                <button id="resetBtn" class="btn"><i class="fas fa-redo"></i> 重新开始</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <p class="hint">使用键盘的 <i class="fas fa-arrow-up"></i> <i class="fas fa-arrow-down"></i> <i class="fas fa-arrow-left"></i> <i class="fas fa-arrow-right"></i> 方向键控制小蛇移动</p>
        <div class="status" id="gameStatus">点击“开始游戏”吧！</div>
    </div>
    <script src="./game.js"></script>
</body>
</html>
