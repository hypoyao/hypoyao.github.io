<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数独乐园</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="./sudoku.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>数独乐园</h1>
          <a class="creatorBadge" aria-label="创作者" href="/creators/tianqing">
            <img class="creatorBadgeAvatar" src="/assets/avatars/yaotianjing.svg" alt="天晴头像" />
            <span class="creatorBadgeName">创作者：天晴</span>
          </a>
          <p class="desc" id="ruleText">规则：每行/每列/每个 3×3 宫格内，数字 1-9 不能重复。填满并正确则晋级，提交错误则退级。</p>
        </header>

        <section class="sdkHud" aria-label="difficulty and progress">
          <div class="sdkDiffWrap" aria-label="difficulty">
            <div class="sdkDiffLabel">难度等级</div>
            <div class="sdkDiffGrid" id="diffGrid" role="button" tabindex="0" aria-label="难度等级"></div>
            <span class="srOnly" id="diffText">难度等级 --</span>
          </div>
          <div class="sdkRight">
            <div class="sdkLvText" id="levelText">第 1 级</div>
            <div class="sdkHint" id="hintText">点击格子选中，再点数字</div>
          </div>
        </section>

        <div class="sdkBoard" id="board" aria-label="sudoku board"></div>

        <div class="sdkPad" aria-label="number pad">
          <div class="sdkNums" id="pad"></div>
          <button class="sdkEraseBtn" id="eraseBtn" type="button">清空</button>
        </div>

        <div class="gameActions sdkActions">
          <button class="btn" id="submitBtn" type="button">提交检查</button>
          <button class="btn btnSecondary" id="newBtn" type="button">换一题</button>
          
        </div>

        <div class="gameFooter">
          <a class="btn btnGray" href="/">返回首页</a>
        </div>
      </section>
    </main>

    <!-- 结果弹窗 -->
    <div class="modal" id="sdkModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="sudoku result dialog">
        <div class="modalTitle" id="sdkModalTitle">提示</div>
        <div class="modalBody" id="sdkModalBody" style="font-size: 18px">--</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="sdkModalBtn" type="button">继续</button>
        </div>
      </div>
    </div>

    <!-- 难度提示 -->
    <div class="modal" id="sdkTipModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel tipPanel" role="dialog" aria-modal="true" aria-label="sudoku tip dialog">
        <div class="tipText" id="sdkTipText">难度等级 1-10，输赢后会自动升降等级</div>
      </div>
    </div>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./sudoku.js"></script>
    <script>
      ;(function () {
        try {
          const p = location.pathname || ""
          const gi = p.indexOf("/games/")
          if (gi < 0) return
          const base = p.slice(0, gi)
          const m = p.slice(gi).match(/^\/games\/([^/]+)\//)
          const gid = m && m[1]
          if (!gid) return
          fetch(`${base}/api/games/${encodeURIComponent(gid)}`, { cache: "no-store" })
            .then((r) => r.json())
            .then((j) => {
              const g = j && j.ok && j.game ? j.game : null
              if (!g) return
              if (g.ruleText) {
                const el = document.getElementById("ruleText")
                if (el) el.textContent = g.ruleText
              }
              if (g.title) {
                document.title = g.title
                const h1 = document.querySelector("h1")
                if (h1) h1.textContent = g.title
              }
            })
            .catch(() => {})
        } catch {}
      })()
    </script>
  </body>
</html>
