<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1><i class="fas fa-dragon"></i> 贪吃蛇小游戏 <i class="fas fa-apple-alt"></i></h1>
            <div class="score-board">
                <div class="score">分数: <span id="score">0</span></div>
                <div class="record">最高分: <span id="high-score">0</span></div>
            </div>
        </header>
        
        <div class="game-area">
            <canvas id="game-canvas" width="600" height="450" tabindex="0"></canvas>
            <div class="controls">
                <div class="control-row">
                    <button class="control-btn" id="up-btn"><i class="fas fa-arrow-up"></i></button>
                </div>
                <div class="control-row">
                    <button class="control-btn" id="left-btn"><i class="fas fa-arrow-left"></i></button>
                    <div class="space-btn"></div>
                    <button class="control-btn" id="right-btn"><i class="fas fa-arrow-right"></i></button>
                </div>
                <div class="control-row">
                    <button class="control-btn" id="down-btn"><i class="fas fa-arrow-down"></i></button>
                </div>
            </div>
        </div>
        
        <div class="game-controls">
            <button id="start-btn" class="game-btn play-btn"><i class="fas fa-play"></i> 开始游戏</button>
            <button id="pause-btn" class="game-btn pause-btn"><i class="fas fa-pause"></i> 暂停游戏</button>
            <button id="restart-btn" class="game-btn restart-btn"><i class="fas fa-redo"></i> 重新开始</button>
        </div>
        
        <div class="instructions">
            <h2><i class="fas fa-gamepad"></i> 游戏说明</h2>
            <p><i class="fas fa-arrow-up"></i> <i class="fas fa-arrow-down"></i> <i class="fas fa-arrow-left"></i> <i class="fas fa-arrow-right"></i> 用方向键控制小蛇</p>
            <p><i class="fas fa-apple-alt" style="color:#e74c3c;"></i> 吃到苹果可以变长</p>
            <p><i class="fas fa-skull-crossbones"></i> 不要撞到墙壁或自己</p>
        </div>
        
        <footer>
            <p>小小程序员创造的游戏世界！ <i class="fas fa-heart"></i></p>
        </footer>
    </div>
    
    <script src="game.js"></script>
    <script>
        // 让游戏画布自动获得焦点，这样键盘控制更灵敏
        window.addEventListener('load', function() {
            document.getElementById('game-canvas').focus();
        });
    </script>
</body>
</html>
