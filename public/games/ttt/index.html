<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>井字棋对决</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>井字棋对决</h1>
          <a class="creatorBadge" aria-label="创作者" href="/creators/haibo">
            <img class="creatorBadgeAvatar" src="/assets/avatars/yaohaibo.svg" alt="海波头像" />
            <span class="creatorBadgeName">创作者：海波</span>
          </a>
          <p class="desc">
            规则：两人轮流落子；每人最多 3 子；当你落下第 4 子时，会移除你<strong>最早</strong>落下的那颗；三子连成一线获胜。
          </p>
        </header>

        <section class="stats" aria-label="player stats">
          <div class="statsMain">
            <div class="statsRow">
              <div class="diffWrap" aria-label="difficulty">
                <div class="diffLabel">难度等级</div>
                <div class="diffGrid" id="diffGrid" role="button" tabindex="0" aria-label="难度等级"></div>
                <span class="srOnly" id="diffText">难度等级 --</span>
              </div>
              <div class="statsSide">
                <div class="statsRateSmall" id="winRate">胜率 --%</div>
                <div class="statsSub">
                  <span id="winLoss">0胜 0负</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <div class="status" id="status"></div>

        <div class="board" id="board" aria-label="tic-tac-toe board">
          <!-- cells generated by JS -->
        </div>

        <div class="gameActions">
          <button class="btn" id="resetBtn" type="button">重新开始</button>
          
        </div>
      </section>
    </main>

    <!-- 自定义结果弹窗：避免浏览器 alert 标题显示 file:// / origin -->
    <div class="modal" id="resultModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="result dialog">
        <div class="modalTitle" id="resultTitle">本局结果</div>
        <div class="modalBody" id="resultBody">--</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="playAgainBtn" type="button">再来一局</button>
        </div>
      </div>
    </div>

    <!-- 彩蛋弹窗：多次点击触发 -->
    <div class="modal" id="easterModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="easter egg dialog">
        <div class="modalTitle" id="easterTitle">彩蛋</div>
        <div class="modalBody" id="easterBody">
          <div>当前文件更新时间：<strong id="easterUpdatedAt">--</strong></div>
          <div style="margin-top: 10px">当前等级：<strong id="easterDiff">--</strong> / 10</div>
          <div style="margin-top: 10px">
            全网游戏已玩次数（按访问量估算）：<strong><span id="busuanzi_value_page_pv"></span></strong> 局
          </div>
          <div style="margin-top: 10px; font-size: 14px; font-weight: 800">
            <span id="busuanzi_container_page_pv" style="display:none"></span>
            <span id="busuanzi_container_site_pv">本站总访问量 <span id="busuanzi_value_site_pv"></span> 次</span>
            <span style="opacity: 0.65; margin: 0 6px">·</span>
            <span>UV（按“重新开始”次数）：<span id="restartUv">0</span></span>
          </div>
        </div>
        <div class="modalActions">
          <button class="btn modalBtn" id="easterCloseBtn" type="button">关闭</button>
        </div>
      </div>
    </div>

    <!-- 提示弹窗：用于“难度等级”说明（无标题，点空白处关闭） -->
    <div class="modal" id="tipModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel tipPanel" role="dialog" aria-modal="true" aria-label="tip dialog">
        <div class="tipText" id="tipText">--</div>
      </div>
    </div>

    <!-- 难度调节彩蛋：连续点击“轮到你落子”3次触发 -->
    <div class="modal" id="diffModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="difficulty dialog">
        <div class="modalTitle">难度调节</div>
        <div class="modalBody" style="font-size: 16px">
          <div>手动选择难度等级（1-10）：</div>
          <div class="diffPicker" id="diffModalPicker" aria-label="difficulty picker"></div>
          <div style="margin-top: 10px; font-size: 13px; color: rgba(100, 116, 139, 0.95)">
            当前等级：<strong id="diffModalCurrent">--</strong>
          </div>
        </div>
        <div class="modalActions">
          <button class="btn modalBtn" id="diffModalCloseBtn" type="button">关闭</button>
        </div>
      </div>
    </div>

    <script src="/rest.js"></script>
    <script src="/publish-entry.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
