<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.80"/>
    </linearGradient>
  </defs>

  <rect width="720" height="480" rx="28" fill="url(#bg)"/>
  <rect x="48" y="40" width="624" height="400" rx="26" fill="url(#card)" stroke="rgba(15,23,42,0.10)" stroke-width="2"/>

  <!-- board -->
  <g transform="translate(128,86)">
    <rect x="0" y="0" width="464" height="308" rx="18" fill="#fff" stroke="rgba(15,23,42,0.18)" stroke-width="3"/>
    <!-- grid lines -->
    <g stroke="rgba(15,23,42,0.16)" stroke-width="2">
      <!-- vertical 9 files -->
      <line x1="0" y1="0" x2="0" y2="308"/>
      <line x1="58" y1="0" x2="58" y2="308"/>
      <line x1="116" y1="0" x2="116" y2="308"/>
      <line x1="174" y1="0" x2="174" y2="308"/>
      <line x1="232" y1="0" x2="232" y2="308"/>
      <line x1="290" y1="0" x2="290" y2="308"/>
      <line x1="348" y1="0" x2="348" y2="308"/>
      <line x1="406" y1="0" x2="406" y2="308"/>
      <line x1="464" y1="0" x2="464" y2="308"/>
      <!-- horizontal 10 ranks -->
      <line x1="0" y1="0" x2="464" y2="0"/>
      <line x1="0" y1="34" x2="464" y2="34"/>
      <line x1="0" y1="68" x2="464" y2="68"/>
      <line x1="0" y1="102" x2="464" y2="102"/>
      <line x1="0" y1="136" x2="464" y2="136"/>
      <line x1="0" y1="172" x2="464" y2="172"/>
      <line x1="0" y1="206" x2="464" y2="206"/>
      <line x1="0" y1="240" x2="464" y2="240"/>
      <line x1="0" y1="274" x2="464" y2="274"/>
      <line x1="0" y1="308" x2="464" y2="308"/>
    </g>
    <!-- river text -->
    <text x="232" y="160" text-anchor="middle" font-size="20" font-weight="800" fill="rgba(15,23,42,0.35)">楚 河 · 汉 界</text>
  </g>

  <!-- pieces -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Noto Sans SC, Arial" font-weight="900">
    <g transform="translate(156,118)">
      <circle cx="0" cy="0" r="22" fill="#fff" stroke="rgba(239,68,68,0.65)" stroke-width="3"/>
      <text x="0" y="8" text-anchor="middle" font-size="22" fill="rgba(239,68,68,0.95)">帅</text>
    </g>
    <g transform="translate(564,360)">
      <circle cx="0" cy="0" r="22" fill="#fff" stroke="rgba(15,23,42,0.55)" stroke-width="3"/>
      <text x="0" y="8" text-anchor="middle" font-size="22" fill="rgba(15,23,42,0.80)">将</text>
    </g>
  </g>

  <!-- title -->
  <text x="360" y="70" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Noto Sans SC, Arial" font-size="26" font-weight="1000" fill="rgba(15,23,42,0.88)">中国象棋·人机对战</text>
  <text x="360" y="418" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Noto Sans SC, Arial" font-size="14" font-weight="800" fill="rgba(100,116,139,0.9)">难度 1-10 · 胜利升一级 · 失败降一级</text>
</svg>

