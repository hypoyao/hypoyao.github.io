<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <rect width="720" height="480" rx="28" fill="url(#bg)"/>
  <text x="360" y="66" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, Roboto, Noto Sans SC, Arial"
        font-size="26" font-weight="1000" fill="rgba(15,23,42,0.88)">围棋对弈·人机</text>

  <g transform="translate(140,92)">
    <rect x="0" y="0" width="440" height="320" rx="20" fill="url(#board)" stroke="rgba(15,23,42,0.18)" stroke-width="3"/>
    <g stroke="rgba(15,23,42,0.22)" stroke-width="2">
      <!-- 9x9 grid -->
      <line x1="44" y1="40" x2="396" y2="40"/>
      <line x1="44" y1="80" x2="396" y2="80"/>
      <line x1="44" y1="120" x2="396" y2="120"/>
      <line x1="44" y1="160" x2="396" y2="160"/>
      <line x1="44" y1="200" x2="396" y2="200"/>
      <line x1="44" y1="240" x2="396" y2="240"/>
      <line x1="44" y1="280" x2="396" y2="280"/>
      <line x1="44" y1="320" x2="396" y2="320" opacity="0"/>

      <line x1="44" y1="40" x2="44" y2="280"/>
      <line x1="88" y1="40" x2="88" y2="280"/>
      <line x1="132" y1="40" x2="132" y2="280"/>
      <line x1="176" y1="40" x2="176" y2="280"/>
      <line x1="220" y1="40" x2="220" y2="280"/>
      <line x1="264" y1="40" x2="264" y2="280"/>
      <line x1="308" y1="40" x2="308" y2="280"/>
      <line x1="352" y1="40" x2="352" y2="280"/>
      <line x1="396" y1="40" x2="396" y2="280"/>
    </g>

    <!-- stones -->
    <g>
      <circle cx="220" cy="160" r="16" fill="rgba(15,23,42,0.92)" />
      <circle cx="176" cy="160" r="16" fill="#fff" stroke="rgba(15,23,42,0.20)" stroke-width="2"/>
      <circle cx="264" cy="160" r="16" fill="#fff" stroke="rgba(15,23,42,0.20)" stroke-width="2"/>
      <circle cx="220" cy="120" r="16" fill="#fff" stroke="rgba(15,23,42,0.20)" stroke-width="2"/>
      <circle cx="220" cy="200" r="16" fill="#fff" stroke="rgba(15,23,42,0.20)" stroke-width="2"/>
    </g>
  </g>

  <text x="360" y="438" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, Roboto, Noto Sans SC, Arial"
        font-size="14" font-weight="800" fill="rgba(100,116,139,0.9)">难度 1-10 · 胜利升一级 · 失败降一级 · 双方 Pass 结束数目</text>
</svg>

