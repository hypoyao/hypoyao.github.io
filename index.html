<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>井字棋（三子版）</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <h1>井字棋（三子版）</h1>
          <p class="desc">
            规则：两人轮流落子；每人最多 3 子；当你落下第 4 子时，会移除你<strong>最早</strong>落下的那颗；三子连成一线获胜。
          </p>
          <div class="toolbar">
            <label class="tool" for="difficulty">
              <span class="toolLabel">难度</span>
              <select id="difficulty" class="select" aria-label="difficulty">
                <option value="easy">简单</option>
                <option value="medium" selected>中等</option>
                <option value="hard">超强</option>
              </select>
            </label>
            <span class="pill" id="difficultyPill">中等</span>
          </div>
        </header>

        <section class="stats" aria-label="player stats">
          <div class="statsMain">
            <div class="statsTitle">你的战绩</div>
            <div class="statsRate" id="winRate">胜率 --%</div>
            <div class="statsSub">
              <span id="winLoss">0胜 0负</span>
              <span class="dot">•</span>
              <span class="uid" id="userId">ID: --</span>
            </div>
          </div>
        </section>

        <div class="status" id="status"></div>

        <div class="board" id="board" aria-label="tic-tac-toe board">
          <!-- cells generated by JS -->
        </div>

        <div class="meta">
          <div class="metaRow">
            <span class="label p1">你 (X)</span>
            <span class="value" id="p1Count">0 / 3</span>
          </div>
          <div class="metaRow">
            <span class="label p2">AI (O)</span>
            <span class="value" id="p2Count">0 / 3</span>
          </div>
        </div>

        <div class="actions">
          <button class="btn" id="resetBtn" type="button">重新开始</button>
        </div>
      </section>

      <footer class="footer">
        <span>对战模式：你(X) vs AI(O)。难度：<strong id="difficultyText">中等</strong></span>
      </footer>
    </main>

    <!-- 自定义结果弹窗：避免浏览器 alert 标题显示 file:// / origin -->
    <div class="modal" id="resultModal" aria-hidden="true">
      <div class="modalBackdrop" data-close="1"></div>
      <div class="modalPanel" role="dialog" aria-modal="true" aria-label="result dialog">
        <div class="modalTitle" id="resultTitle">本局结果</div>
        <div class="modalBody" id="resultBody">--</div>
        <div class="modalActions">
          <button class="btn modalBtn" id="playAgainBtn" type="button">再来一局</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
