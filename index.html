<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI创意小游戏</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card homeCard">
        <header class="header">
          <h1>AI创意小游戏</h1>
          <p class="desc">AI 时代，释放孩子的奇思妙想，体验创造的快乐。</p>
        </header>

        <section class="gameGrid" aria-label="game list">
          <a class="gameItem" href="./ttt.html" aria-label="井字棋对决">
            <img class="gameThumb" src="/assets/screenshots/ttt.png" alt="井字棋对决截图" />
            <div>
              <div class="gameName">井字棋对决</div>
              <div class="gameDesc">3 子上限版井字棋，对战 AI</div>
              <div class="gameMeta">创作者：海波</div>
            </div>
          </a>

          <a class="gameItem" href="./memory.html" aria-label="记忆闪击">
            <img class="gameThumb" src="/assets/screenshots/memory.png" alt="记忆闪击截图" />
            <div>
              <div class="gameName">记忆闪击</div>
              <div class="gameDesc">看亮起顺序依次点击，连胜晋级</div>
              <div class="gameMeta">创作者：海波</div>
            </div>
          </a>

          <a class="gameItem" href="./mole.html" aria-label="极速打地鼠">
            <img class="gameThumb" src="/assets/screenshots/mole.png" alt="极速打地鼠截图" />
            <div>
              <div class="gameName">极速打地鼠</div>
              <div class="gameDesc">30 秒计时，速度越来越快</div>
              <div class="gameMeta">创作者：天晴</div>
            </div>
          </a>

          <a class="gameItem" href="./gomoku.html" aria-label="五子棋·限五子">
            <img class="gameThumb" src="/assets/screenshots/gomoku.png" alt="五子棋截图" />
            <div>
              <div class="gameName">五子棋·限五子</div>
              <div class="gameDesc">您 vs AI，第 6 子会顶掉最早那颗</div>
              <div class="gameMeta">创作者：天晴</div>
            </div>
          </a>

          <a class="gameItem" href="./sudoku.html" aria-label="数独乐园">
            <img class="gameThumb" src="/assets/screenshots/sudoku.png" alt="数独乐园截图" />
            <div>
              <div class="gameName">数独乐园</div>
              <div class="gameDesc">填数字闯关：成功晋级，失败退级</div>
              <div class="gameMeta">创作者：天晴</div>
            </div>
          </a>

          <a class="gameItem" href="./chess.html" aria-label="国际象棋大师">
            <img class="gameThumb" src="/assets/screenshots/chess.png" alt="国际象棋大师截图" />
            <div>
              <div class="gameName">国际象棋大师</div>
              <div class="gameDesc">标准国际象棋：您执白对战 AI</div>
              <div class="gameMeta">创作者：天晴</div>
            </div>
          </a>
        </section>

      </section>
    </main>

    <!-- Vercel Web Analytics（inject 方式） -->
    <script type="module">
      import { injectSpeedInsights } from "./vendor/@vercel/speed-insights/dist/index.mjs"
      import { inject } from "./vendor/@vercel/analytics/index.mjs"
      injectSpeedInsights()
      inject()
    </script>
  </body>
</html>
