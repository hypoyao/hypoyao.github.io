<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天晴 - 创作者</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./home.css" />
    <link rel="stylesheet" href="./creators.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card homeCard">
        <header class="header">
          <h1>创作者</h1>
          <p class="desc">AI 时代，释放孩子的奇思妙想，体验创造的快乐。</p>
          <p class="homeSub">点击作品卡片进入小游戏。</p>
        </header>

        <section class="creatorList" aria-label="creator">
          <section class="creatorCard" aria-label="creator-yaotianjing">
            <div class="creatorHead">
              <img class="creatorAvatar" src="./assets/avatars/yaotianjing.svg" alt="天晴头像" />
              <div class="creatorInfo">
                <div class="creatorName">天晴</div>
                <div class="creatorTag">作品集</div>
              </div>
            </div>

            <div class="creatorWorks">
              <a class="gameItem gameItemCompact" href="./mole.html" aria-label="极速打地鼠">
                <img class="gameThumb" src="./assets/screenshots/mole.png" alt="极速打地鼠截图" />
                <div>
                  <div class="gameName">极速打地鼠</div>
                  <div class="gameDesc">30 秒计时，速度越来越快</div>
                </div>
              </a>

              <a class="gameItem gameItemCompact" href="./gomoku.html" aria-label="五子棋·限五子">
                <img class="gameThumb" src="./assets/screenshots/gomoku.png" alt="五子棋截图" />
                <div>
                  <div class="gameName">五子棋·限五子</div>
                  <div class="gameDesc">您 vs AI，第 6 子会顶掉最早那颗</div>
                </div>
              </a>

              <a class="gameItem gameItemCompact" href="./sudoku.html" aria-label="数独乐园">
                <img class="gameThumb" src="./assets/screenshots/sudoku.png" alt="数独乐园截图" />
                <div>
                  <div class="gameName">数独乐园</div>
                  <div class="gameDesc">填数字闯关：成功晋级，失败退级</div>
                </div>
              </a>

              <a class="gameItem gameItemCompact" href="./chess.html" aria-label="国际象棋大师">
                <img class="gameThumb" src="./assets/screenshots/chess.png" alt="国际象棋大师截图" />
                <div>
                  <div class="gameName">国际象棋大师</div>
                  <div class="gameDesc">标准国际象棋：您执白对战 AI</div>
                </div>
              </a>
            </div>
          </section>
        </section>

        <div class="homeFooter">
          <a class="btn btnSecondary" href="./index.html">返回首页</a>
        </div>
      </section>
    </main>
  </body>
</html>
