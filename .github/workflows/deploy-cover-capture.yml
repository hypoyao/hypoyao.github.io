name: Deploy Miaodian Cover Capture

on:
  push:
    branches: ["master"]
    paths:
      - "services/miaodian-cover-capture/**"
      - ".github/workflows/deploy-cover-capture.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tencent-lighthouse-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Configure SSH
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$TENCENT_HOST"
          test -n "$TENCENT_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$TENCENT_SSH_KEY" > ~/.ssh/tencent_deploy_key
          chmod 600 ~/.ssh/tencent_deploy_key
          ssh-keyscan -H "$TENCENT_HOST" >> ~/.ssh/known_hosts

      - name: Sync capture service
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
        run: |
          set -euo pipefail
          test -n "$TENCENT_HOST"
          test -n "$TENCENT_USER"
          ssh -i ~/.ssh/tencent_deploy_key -o IdentitiesOnly=yes \
            "$TENCENT_USER@$TENCENT_HOST" \
            'mkdir -p /var/www/miaodian-cover-capture/current'
          rsync -az --delete \
            --exclude='node_modules/' \
            -e "ssh -i ~/.ssh/tencent_deploy_key -o IdentitiesOnly=yes" \
            services/miaodian-cover-capture/ \
            "$TENCENT_USER@$TENCENT_HOST:/var/www/miaodian-cover-capture/current/"

      - name: Install and start service
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/tencent_deploy_key -o IdentitiesOnly=yes \
            "$TENCENT_USER@$TENCENT_HOST" \
            'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /var/www/miaodian-cover-capture/current

          if [ ! -f .env ]; then
            cat > .env <<'ENVFILE'
          PORT=3000
          HOST=127.0.0.1
          ALLOWED_PREVIEW_HOSTS=cloud1-d7guxi87wac162e06-1377286614.ap-shanghai.app.tcloudbase.com
          ENVFILE
          fi

          npm install --omit=dev
          npx playwright install --with-deps chromium

          sudo systemctl stop aiprograms || true
          sudo systemctl disable aiprograms || true

          sudo tee /etc/systemd/system/miaodian-cover-capture.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Miaodian Cover Capture Service
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/var/www/miaodian-cover-capture/current
          Environment=NODE_ENV=production
          EnvironmentFile=/var/www/miaodian-cover-capture/current/.env
          ExecStart=/usr/bin/env node server.js
          Restart=always
          RestartSec=3
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable miaodian-cover-capture
          sudo systemctl restart miaodian-cover-capture
          sleep 2
          curl -fsS http://127.0.0.1:3000/health
          REMOTE
