name: Stop Tencent Lighthouse App

on:
  push:
    branches: ["master"]
    paths:
      - ".github/workflows/stop-aiprograms.yml"
      - ".github/workflows/tencent-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tencent-lighthouse-production
  cancel-in-progress: true

jobs:
  stop:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Configure SSH
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$TENCENT_HOST"
          test -n "$TENCENT_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$TENCENT_SSH_KEY" > ~/.ssh/tencent_deploy_key
          chmod 600 ~/.ssh/tencent_deploy_key
          ssh-keyscan -H "$TENCENT_HOST" >> ~/.ssh/known_hosts

      - name: Stop old website service
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
        run: |
          set -euo pipefail
          test -n "$TENCENT_HOST"
          test -n "$TENCENT_USER"
          ssh -i ~/.ssh/tencent_deploy_key -o IdentitiesOnly=yes \
            "$TENCENT_USER@$TENCENT_HOST" \
            'sudo systemctl stop aiprograms && sudo systemctl is-active aiprograms || true'
